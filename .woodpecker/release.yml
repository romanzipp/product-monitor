# Tag-triggered release pipeline.
# Tag without `v` prefix (e.g. `1.0.0`, `1.2.3-rc.1`).
# Woodpecker uses doublestar glob — `*` matches anything, no `+` quantifier.
when:
  - event: tag
    ref: refs/tags/[0-9]*.[0-9]*.[0-9]*

variables:
  - &registry registry.apex.romanzipp.cloud
  - &image_repo registry.apex.romanzipp.cloud/portasplit-monitor-image
  - &step_resources
    backend_options:
      kubernetes:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 1000m
            memory: 1Gi

steps:
  - name: build-and-push-image
    image: woodpeckerci/plugin-docker-buildx:6.1.0
    <<: *step_resources
    settings:
      registry: *registry
      repo: *image_repo
      tags:
        - ${CI_COMMIT_TAG}
        - latest
      username:
        from_secret: registry_username
      password:
        from_secret: registry_token
      build_args:
        VERSION: ${CI_COMMIT_TAG}

  - name: package-and-push-chart
    image: alpine/helm:3.16.2
    <<: *step_resources
    environment:
      REGISTRY_USERNAME:
        from_secret: registry_username
      REGISTRY_TOKEN:
        from_secret: registry_token
    commands:
      - echo "$REGISTRY_TOKEN" | helm registry login registry.apex.romanzipp.cloud --username "$REGISTRY_USERNAME" --password-stdin
      - helm package deploy/helm/portasplit-monitor --version "$CI_COMMIT_TAG" --app-version "$CI_COMMIT_TAG" --destination dist/
      - helm push "dist/portasplit-monitor-chart-${CI_COMMIT_TAG}.tgz" oci://registry.apex.romanzipp.cloud
