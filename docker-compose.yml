# Local / single-host deployment. Mirrors the Helm chart: the monitor talks to
# FlareSolverr over the compose network to bypass Cloudflare on braucheklima.
services:
  monitor:
    build:
      context: .
      args:
        VERSION: dev
    image: portasplit-monitor:dev
    restart: unless-stopped
    env_file: .env
    # The distroless image ships no .env; config comes from these env vars.
    # FLARESOLVERR_URL points at the sibling service over the compose network.
    environment:
      DB_PATH: /data/portasplit-monitor.db
      FLARESOLVERR_URL: http://flaresolverr:8191
      METRICS_ADDR: ":8080"
    ports:
      - "8080:8080" # Prometheus /metrics
    volumes:
      - monitor-data:/data
    depends_on:
      flaresolverr:
        condition: service_healthy

  flaresolverr:
    # v3.5.0 solves braucheklima's current Cloudflare challenge; v3.3.21 times out.
    image: ghcr.io/flaresolverr/flaresolverr:v3.5.0
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      TZ: Europe/Berlin
    ports:
      - "8191:8191"
    # Headless Chrome crashes under load without a roomy /dev/shm.
    shm_size: 256mb
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8191/').status==200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  monitor-data:
