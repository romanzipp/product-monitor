# product-monitor configuration.
# Copy to config.yaml and run: `make run` (or mount it in Docker/Kubernetes).
# Secrets are NOT set here — PUSHOVER_TOKEN and PUSHOVER_USER come from the
# environment (or a .env file). Every field below is optional; omitted keys fall
# back to the defaults shown.

checkInterval: 5m
httpTimeout: 30s
dbPath: klima.db            # container/prod: /data/product-monitor.db
metricsAddr: ":8080"        # Prometheus /metrics listen address
priceMax: 0                 # ignore offers above this many euros; 0 = no limit

# Reference location. OBI queries against homePLZ and the in-store filter
# prefixes default to its region (first two digits). localPLZPrefixes keeps an
# in-store result only if its PLZ starts with one of these; online is unaffected.
homePLZ: "36037"
localPLZPrefixes: ["36"]

pushover:
  priority: 2               # 2 = emergency (repeats until acknowledged)
  retry: 60                 # emergency: seconds between repeats (min 30)
  expire: 3600              # emergency: seconds until repeats stop (max 10800)
  device: ""                # optional target device

flaresolverr:
  # Proxy for Cloudflare/anti-bot sources. Empty = fetch directly (residential
  # IP only). Docker Compose: http://flaresolverr:8191
  url: ""
  timeout: 60s

# Each source accepts a list, so one source can watch multiple products. There
# are no built-in defaults: a source with an empty list checks nothing.
sources:
  braucheklima:
    enabled: true
    url: https://braucheklima.de/api/availability
    products:
      - Midea Portasplit
      # - Midea Portasplit Cool
  obi:
    enabled: true
    productIDs:
      - "8620890"
  mediamarkt:
    enabled: true
    urls:
      - https://www.mediamarkt.de/de/product/_midea-porta-split-klimaanlage-grau-max-raumgrosse-42-m-eek-a-142245268.html
  euronics:
    enabled: true
    urls:
      - https://www.euronics.de/haus-und-haushalt/heizen-lueften-kuehlen/kuehlen/split-klimageraete/porta-split-split-klimageraet-a-4065327878899
  globus:
    enabled: true
    urls:
      - https://www.globus-baumarkt.de/p/midea-portasplit-mobile-split-klimaanlage-12000-btu-heiz-kuehlfunktion-0694600235/
  amazon:
    enabled: true
    urls:
      - https://www.amazon.de/dp/B0D3PP64JS
  bauhaus:
    enabled: true
    urls:
      - https://www.bauhaus.info/p/31934233
  hagebau:
    enabled: true
    urls:
      - https://www.hagebau.de/p/midea-klimaanlage-portasplit-anP7004600334/
  hornbach:
    enabled: true
    urls:
      - https://www.hornbach.de/p/klimasplitgeraet-midea-portasplit-12-000-btu-105-m-weiss/12356554/
  toom:
    enabled: true
    urls:
      - https://toom.de/p/mobiles-klimageraet-portasplit-12000-btuh/9350668
  # Bauhaus store pickup availability, checked per product×store (needs
  # flaresolverr; product 31934233 = PortaSplit, store 589 = Frankfurt).
  bauhausStore:
    enabled: true
    productIDs:
      - "31934233"
    storeIDs:
      - "589"
    storeName: Bauhaus Frankfurt
