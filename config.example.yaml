# product-monitor configuration.
# Copy to config.yaml and run: `make run` (or mount it in Docker/Kubernetes).
# Secrets are NOT set here — PUSHOVER_TOKEN and PUSHOVER_USER come from the
# environment (or a .env file). There are no built-in defaults.

checkInterval: 5m
httpTimeout: 30s
dbPath: klima.db            # container/prod: /data/product-monitor.db
metricsAddr: ":8080"        # Prometheus /metrics listen address
priceMax: 0                 # ignore offers above this many euros; 0 = no limit

# localPLZPrefixes keeps an in-store result only if its PLZ starts with one of
# these; online is unaffected. OBI is queried per configured postalCode and
# bypasses this filter.
localPLZPrefixes: ["36"]

pushover:
  priority: 2               # 2 = emergency (repeats until acknowledged)
  retry: 60                 # emergency: seconds between repeats (min 30)
  expire: 3600              # emergency: seconds until repeats stop (max 10800)
  device: ""                # optional target device

flaresolverr:
  # Proxy for Cloudflare/anti-bot sources. Empty = fetch directly (residential
  # IP only). Docker Compose: http://flaresolverr:8191
  url: ""
  timeout: 60s

# Each product has a `name` (used in the notification title) and a `sources` map.
# A source is checked only if it is listed; omit a source to skip it. Every source
# takes a list, so it can watch several product pages at once.
#
# Supported sources (config keys):
#   braucheklima (url + products), obi (productIDs + postalCodes),
#   expert (urls + storeId), bauhausStore (productIDs + stores),
#   and URL-list sources: mediamarkt, euronics, globus, amazon, bauhaus, hagebau,
#   hornbach, toom, solarprofi, galaxus, solario24, evolarshop, bueromarkt,
#   prosatech, tado, solarhandel24, schwabklima, grz, selfio, klimavertrieb,
#   groupsumi, weinmannschanz, talentking, heizungbilliger, tecedo, mediadeal,
#   klimafy, entratek, bobselektro, grsolar.
products:
  - name: Midea PortaSplit
    sources:
      braucheklima:
        url: https://braucheklima.de/api/availability
        products:
          - Midea Portasplit
      obi:
        productIDs:
          - "8620890"
        postalCodes:
          - "36037"
      mediamarkt:
        urls:
          - https://www.mediamarkt.de/de/product/_midea-porta-split-klimaanlage-grau-max-raumgrosse-42-m-eek-a-142245268.html
      amazon:
        urls:
          - https://www.amazon.de/dp/B0D3PP64JS
      expert:
        storeId: e_2879130
        urls:
          - https://www.expert.de/shop/unsere-produkte/haushalt-kuche/wohnklima/klimagerate/32750011559-portasplit-mobile-split-klimaanlage.html
      # Bauhaus store pickup availability, per product×store (needs flaresolverr).
      bauhausStore:
        productIDs:
          - "31934233"
        stores:
          - id: "589"
            name: Bauhaus Frankfurt
