image:
  repository: registry.apex.romanzipp.cloud/product-monitor-image
  pullPolicy: IfNotPresent
  # Defaults to .Chart.AppVersion (== the git tag the chart was packaged from).
  tag: ""

# Keep K8s resource names as `product-monitor` even though the chart is
# `product-monitor-chart`.
fullnameOverride: product-monitor

# Cluster-specific image pull credentials. Populated from the cluster
# (e.g. zot-pull-secret reflected by Reflector). Example:
#   imagePullSecrets:
#     - name: zot-pull-secret
imagePullSecrets: []

# Non-secret runtime config, rendered verbatim into config.yaml (a ConfigMap
# mounted at /etc/product-monitor/config.yaml). Secrets (PUSHOVER_TOKEN,
# PUSHOVER_USER) come from envFromSecret. See config.example.yaml for the schema.
# flaresolverr.url points at the in-cluster FlareSolverr Service below.
config:
  checkInterval: 5m
  httpTimeout: 30s
  dbPath: /data/product-monitor.db
  metricsAddr: ":8080"
  priceMax: 0
  homePLZ: "36037"
  localPLZPrefixes: ["36"]
  pushover:
    priority: 2
    retry: 60
    expire: 3600
    device: ""
  flaresolverr:
    url: http://product-monitor-flaresolverr:8191
    timeout: 60s
  sources:
    braucheklima:
      enabled: true
      url: https://braucheklima.de/api/availability
      product: Midea Portasplit
    obi:
      enabled: true
      productID: "8620890"
    mediamarkt: { enabled: true, url: "" }
    euronics: { enabled: true, url: "" }
    globus: { enabled: true, url: "" }
    amazon: { enabled: true, url: "" }
    bauhaus: { enabled: true, url: "" }
    hagebau: { enabled: true, url: "" }
    hornbach: { enabled: true, url: "" }
    toom: { enabled: true, url: "" }
    bauhausStore:
      enabled: true
      storeID: "589"
      storeName: Bauhaus Frankfurt

# FlareSolverr proxy for Cloudflare-protected sources. When enabled, a
# FlareSolverr Deployment + Service is created; point config.flaresolverr.url
# (above) at that Service so the app can run from IPs Cloudflare would 403.
flaresolverr:
  enabled: true
  image:
    repository: ghcr.io/flaresolverr/flaresolverr
    # v3.5.0 solves braucheklima's current Cloudflare challenge; v3.3.21 times out.
    tag: v3.5.0
    pullPolicy: IfNotPresent
  port: 8191
  env:
    LOG_LEVEL: info
    TZ: Europe/Berlin
  # Headless Chrome is memory-hungry; give it room or it OOMs mid-challenge.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

# Reference to an existing Secret whose keys are injected as env vars. Holds
# the Pushover credentials (PUSHOVER_TOKEN, PUSHOVER_USER). Cluster-specific.
# Example:
#   envFromSecret:
#     name: product-monitor
envFromSecret:
  name: ""

persistence:
  enabled: true
  storageClass: ""
  size: 1Gi
  # SQLite + WAL files. ReadWriteOnce + Recreate is intentional (single replica).
  accessMode: ReadWriteOnce
  mountPath: /data

resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    memory: 256Mi

# Prometheus metrics endpoint (/metrics) and Prometheus Operator ServiceMonitor.
metrics:
  port: 8080
serviceMonitor:
  enabled: true
  interval: 30s
  # Extra labels if your Prometheus selects ServiceMonitors by label.
  labels: {}

# HTTP probes against the metrics server.
probes:
  liveness:
    httpGet: { path: /metrics, port: metrics }
    initialDelaySeconds: 10
    periodSeconds: 30
  readiness:
    httpGet: { path: /metrics, port: metrics }
    initialDelaySeconds: 5
    periodSeconds: 15

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ ALL ]
