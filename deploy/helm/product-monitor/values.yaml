image:
  repository: registry.apex.romanzipp.cloud/product-monitor-image
  pullPolicy: IfNotPresent
  # Defaults to .Chart.AppVersion (== the git tag the chart was packaged from).
  tag: ""

# Keep K8s resource names as `product-monitor` even though the chart is
# `product-monitor-chart`.
fullnameOverride: product-monitor

# Cluster-specific image pull credentials. Populated from the cluster
# (e.g. zot-pull-secret reflected by Reflector). Example:
#   imagePullSecrets:
#     - name: zot-pull-secret
imagePullSecrets: []

# Non-secret runtime config, rendered verbatim into config.yaml (a ConfigMap
# mounted at /etc/product-monitor/config.yaml). Secrets (PUSHOVER_TOKEN,
# PUSHOVER_USER) come from envFromSecret. See config.example.yaml for the schema.
# flaresolverr.url points at the in-cluster FlareSolverr Service below.
config:
  checkInterval: 5m
  httpTimeout: 30s
  dbPath: /data/product-monitor.db
  metricsAddr: ":8080"
  priceMax: 0
  localPLZPrefixes: ["36"]
  pushover:
    priority: 2
    retry: 60
    expire: 3600
    device: ""
  flaresolverr:
    url: http://product-monitor-flaresolverr:8191
    timeout: 60s
