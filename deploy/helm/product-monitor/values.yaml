image:
  repository: registry.apex.romanzipp.cloud/product-monitor-image
  pullPolicy: IfNotPresent
  # Defaults to .Chart.AppVersion (== the git tag the chart was packaged from).
  tag: ""

# Keep K8s resource names as `product-monitor` even though the chart is
# `product-monitor-chart`.
fullnameOverride: product-monitor

# Cluster-specific image pull credentials. Populated from the cluster
# (e.g. zot-pull-secret reflected by Reflector). Example:
#   imagePullSecrets:
#     - name: zot-pull-secret
imagePullSecrets: []

# Non-secret runtime config, rendered verbatim into config.yaml (a ConfigMap
# mounted at /etc/product-monitor/config.yaml). Secrets (PUSHOVER_TOKEN,
# PUSHOVER_USER) come from envFromSecret. See config.example.yaml for the schema.
# flaresolverr.url points at the in-cluster FlareSolverr Service below.
config:
  checkInterval: 5m
  httpTimeout: 30s
  dbPath: /data/product-monitor.db
  metricsAddr: ":8080"
  priceMax: 0
  homePLZ: "36037"
  localPLZPrefixes: ["36"]
  pushover:
    priority: 2
    retry: 60
    expire: 3600
    device: ""
  flaresolverr:
    url: http://product-monitor-flaresolverr:8191
    timeout: 60s
  # Each source takes a list, so one source can watch multiple products.
  sources:
    braucheklima:
      enabled: true
      url: https://braucheklima.de/api/availability
      products: ["Midea Portasplit"]
    obi:
      enabled: true
      productIDs: ["8620890"]
    mediamarkt:
      enabled: true
      urls: ["https://www.mediamarkt.de/de/product/_midea-porta-split-klimaanlage-grau-max-raumgrosse-42-m-eek-a-142245268.html"]
    euronics:
      enabled: true
      urls: ["https://www.euronics.de/haus-und-haushalt/heizen-lueften-kuehlen/kuehlen/split-klimageraete/porta-split-split-klimageraet-a-4065327878899"]
    globus:
      enabled: true
      urls: ["https://www.globus-baumarkt.de/p/midea-portasplit-mobile-split-klimaanlage-12000-btu-heiz-kuehlfunktion-0694600235/"]
    amazon:
      enabled: true
      urls: ["https://www.amazon.de/dp/B0D3PP64JS"]
    bauhaus:
      enabled: true
      urls: ["https://www.bauhaus.info/p/31934233"]
    hagebau:
      enabled: true
      urls: ["https://www.hagebau.de/p/midea-klimaanlage-portasplit-anP7004600334/"]
    hornbach:
      enabled: true
      urls: ["https://www.hornbach.de/p/klimasplitgeraet-midea-portasplit-12-000-btu-105-m-weiss/12356554/"]
    toom:
      enabled: true
      urls: ["https://toom.de/p/mobiles-klimageraet-portasplit-12000-btuh/9350668"]
    bauhausStore:
      enabled: true
      productIDs: ["31934233"]
      storeIDs: ["589"]
      storeName: Bauhaus Frankfurt

# FlareSolverr proxy for Cloudflare-protected sources. When enabled, a
# FlareSolverr Deployment + Service is created; point config.flaresolverr.url
# (above) at that Service so the app can run from IPs Cloudflare would 403.
flaresolverr:
  enabled: true
  image:
    repository: ghcr.io/flaresolverr/flaresolverr
    # v3.5.0 solves braucheklima's current Cloudflare challenge; v3.3.21 times out.
    tag: v3.5.0
    pullPolicy: IfNotPresent
  port: 8191
  env:
    LOG_LEVEL: info
    TZ: Europe/Berlin
  # Headless Chrome is memory-hungry; give it room or it OOMs mid-challenge.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

# Reference to an existing Secret whose keys are injected as env vars. Holds
# the Pushover credentials (PUSHOVER_TOKEN, PUSHOVER_USER). Cluster-specific.
# Example:
#   envFromSecret:
#     name: product-monitor
envFromSecret:
  name: ""

persistence:
  enabled: true
  storageClass: ""
  size: 1Gi
  # SQLite + WAL files. ReadWriteOnce + Recreate is intentional (single replica).
  accessMode: ReadWriteOnce
  mountPath: /data

resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    memory: 256Mi

# Prometheus metrics endpoint (/metrics) and Prometheus Operator ServiceMonitor.
metrics:
  port: 8080
serviceMonitor:
  enabled: true
  interval: 30s
  # Extra labels if your Prometheus selects ServiceMonitors by label.
  labels: {}

# HTTP probes against the metrics server.
probes:
  liveness:
    httpGet: { path: /metrics, port: metrics }
    initialDelaySeconds: 10
    periodSeconds: 30
  readiness:
    httpGet: { path: /metrics, port: metrics }
    initialDelaySeconds: 5
    periodSeconds: 15

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ ALL ]
