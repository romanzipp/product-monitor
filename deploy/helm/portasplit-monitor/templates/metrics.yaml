apiVersion: v1
kind: Service
metadata:
  name: {{ include "portasplit-monitor.fullname" . }}-metrics
  labels:
    {{- include "portasplit-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: metrics
spec:
  clusterIP: None
  selector:
    {{- include "portasplit-monitor.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: app
  ports:
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
{{- if .Values.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "portasplit-monitor.fullname" . }}
  labels:
    {{- include "portasplit-monitor.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "portasplit-monitor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: metrics
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
